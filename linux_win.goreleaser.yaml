version: 2
project_name: sk8-pad

builds:
  - id: linux
    main: .
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: windows
    main: .
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      # Tell Go to use the MingW compiler we just installed
      - CC=x86_64-w64-mingw32-gcc
    ldflags:
      - -s -w -H=windowsgui -X main.version={{.Version}}

archives:
  - name_template: "sk8-pad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

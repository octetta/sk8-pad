version: 2
project_name: sk8-pad
builds:
  - id: linux_windows
    main: .
    env: [CGO_ENABLED=1]
    goos: [linux, windows]
    goarch: [amd64]
    ldflags: [-s -w -X main.version={{.Version}}]
archives:
  - name_template: "sk8-pad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

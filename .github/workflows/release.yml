# Put this in sk8-pad/.github/workflows/release.yml
name: Release SK8-PAD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          # Point Go to your subdirectory for caching
          cache-dependency-path: src/sk8-pad/go.sum

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev libxxf86vm-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          # CRITICAL: This tells GoReleaser to run inside your src folder
          workdir: src/sk8-pad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

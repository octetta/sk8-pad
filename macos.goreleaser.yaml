version: 2
project_name: sk8-pad

builds:
  - id: macos
    main: .
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: "sk8-pad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
